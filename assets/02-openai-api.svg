    <tspan x="22" y="242" fill="#8b949e">data: {"choices":[{"delta":{"content":</tspan><tspan fill="#a5d6ff">" here"</tspan><tspan fill="#8b949e">}}]}</tspan>
    <tspan x="22" y="264" fill="#8b949e">data: {"choices":[{"delta":{"content":</tspan><tspan fill="#a5d6ff">" are"</tspan><tspan fill="#8b949e">}}]}</tspan>
    <tspan x="22" y="286" fill="#8b949e">data: {"choices":[{"delta":{"content":</tspan><tspan fill="#a5d6ff">" three"</tspan><tspan fill="#8b949e">}}]}</tspan>
    <tspan x="22" y="308" fill="#8b949e">data: {"choices":[{"delta":{"content":</tspan><tspan fill="#a5d6ff">" benefits"</tspan><tspan fill="#8b949e">}}]}</tspan>
