<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 288" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <rect x="0.5" y="0.5" width="759" height="287" rx="10" fill="#0d1117" stroke="#30363d"/>
  <path d="M0 10 a10 10 0 0 1 10 -10 h740 a10 10 0 0 1 10 10 v26 h-760 z" fill="#161b22"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="18" r="6" fill="#27c93f"/>
  <text x="380" y="22" fill="#8b949e" font-size="12" text-anchor="middle">03-dotnet-chat</text>
  <text font-size="13.5" xml:space="preserve">
    <tspan x="22" y="66" fill="#7ee787">$ dotnet run</tspan>
    <tspan x="22" y="88" fill="#c9d1d9">Docker Model Runner chat. Model: ai/gemma3</tspan>
    <tspan x="22" y="110" fill="#c9d1d9">Endpoint: http://localhost:12434/engines/v1</tspan>
    <tspan x="22" y="132" fill="#8b949e">Type a message and press Enter. Type /exit to quit.</tspan>
    <tspan x="22" y="176" fill="#d2a8ff">you&gt; </tspan><tspan fill="#c9d1d9">What is the capital of France? One short sentence.</tspan>
    <tspan x="22" y="198" fill="#58a6ff">ai&gt;  </tspan><tspan fill="#c9d1d9">The capital of France is Paris.</tspan>
    <tspan x="22" y="242" fill="#d2a8ff">you&gt; </tspan><tspan fill="#c9d1d9">/exit</tspan>
    <tspan x="22" y="264" fill="#c9d1d9">Bye.</tspan>
  </text>
</svg>
